services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: laravel_app
    env_file:
      - .env
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app_code:/var/www
      - composer_cache:/tmp/composer-cache
      - ${SSH_PATH}:/root/.ssh:ro
    environment:
      GIT_SSH_COMMAND: ${GIT_SSH_COMMAND}
    networks:
      - laravel
    dns:
      - 8.8.8.8
      - 1.1.1.1

  web:
    image: nginx:1.27-alpine
    container_name: laravel_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app_code:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

volumes:
  app_code:
  composer_cache:

networks:
  laravel:
    driver: bridge
